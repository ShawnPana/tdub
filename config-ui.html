<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Terminum Settings</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #1a1a1a; color: #ddd; }
  body { font: 13px -apple-system, BlinkMacSystemFont, sans-serif;
         display: flex; flex-direction: column; }
  .scroll { flex: 1; min-height: 0; overflow-y: auto; padding: 16px 20px; }
  h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: 0.3px; }
  .sub { color: #888; font-size: 11px; margin: 4px 0 16px; }
  h2 { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.6px;
       margin: 18px 0 6px; font-weight: 600; border-bottom: 1px solid #2a2a2a; padding-bottom: 4px; }
  .row { display: flex; align-items: center; gap: 10px; padding: 3px 0; }
  .row label { flex: 0 0 170px; color: #aaa; font-size: 12px; }
  input[type=text], input[type=number] {
    background: #0d0d0d; color: #ddd; border: 1px solid #333;
    padding: 4px 8px; font: 12px ui-monospace, SFMono-Regular, Menlo, monospace;
    border-radius: 3px; width: 260px; outline: none;
  }
  input[type=text]:focus, input[type=number]:focus { border-color: #4a9eff; }
  input[type=number] { width: 100px; }
  input[type=color] {
    background: transparent; border: 1px solid #333; width: 40px; height: 26px;
    padding: 0; cursor: pointer; border-radius: 3px;
  }
  input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; }
  .footer { padding: 10px 20px;
            background: #151515; border-top: 1px solid #2a2a2a;
            display: flex; gap: 10px; justify-content: flex-end; align-items: center;
            flex: 0 0 auto; }
  button { background: #2a2a2a; color: #ddd; border: 1px solid #3a3a3a;
           padding: 6px 16px; cursor: pointer; border-radius: 3px; font: inherit; }
  button#save { background: #cd0000; color: #fff; border-color: #8a0000; font-weight: 600; }
  button:hover { background: #3a3a3a; }
  button#save:hover { background: #e50000; }
  .msg { flex: 1; font-size: 11px; padding-left: 4px; }
  .msg.err { color: #cd0000; }
  .msg.ok { color: #4a9eff; }
</style>
</head>
<body>
  <div class="scroll">
  <h1>Terminum Settings</h1>
  <div class="sub">Saves to <code>~/.config/terminum/config.json</code>. Only values differing from defaults are written.</div>

  <h2>Keybindings</h2>
  <div class="sub" style="margin:0 0 8px">Comma-separated chords per action. Syntax: <code>Cmd+T</code>, <code>Cmd+Alt+Shift+N</code>, <code>Alt+ArrowLeft</code>. Case-insensitive.</div>
  <div id="keybindings"></div>

  <h2>Terminal</h2>
  <div class="row"><label>Font family</label><input type="text" id="t-fontFamily" /></div>
  <div class="row"><label>Font size</label><input type="number" id="t-fontSize" min="6" max="72" /></div>
  <div class="row"><label>Cursor blink</label><input type="checkbox" id="t-cursorBlink" /></div>
  <div class="row"><label>Background</label><input type="color" id="t-bg" /></div>
  <div class="row"><label>Foreground</label><input type="color" id="t-fg" /></div>
  <div class="row"><label>Shell override</label><input type="text" id="t-shell" placeholder="(default: $SHELL)" /></div>

  <h2>Window</h2>
  <div class="row"><label>Initial width</label><input type="number" id="w-width" min="200" /></div>
  <div class="row"><label>Initial height</label><input type="number" id="w-height" min="200" /></div>

  <h2>Panes</h2>
  <div class="row"><label>Inactive border</label><input type="color" id="p-inactive" /></div>
  <div class="row"><label>Focused border</label><input type="color" id="p-focused" /></div>
  <div class="row"><label>Border width</label><input type="number" id="p-width" min="0" max="10" /></div>

  <h2>Workspaces</h2>
  <div class="row"><label>Wrap on cycle</label><input type="checkbox" id="ws-wrap" /></div>
  <div class="row"><label>Bar background</label><input type="color" id="ws-bg" /></div>
  <div class="row"><label>Bar foreground</label><input type="color" id="ws-fg" /></div>
  <div class="row"><label>Active foreground</label><input type="color" id="ws-active" /></div>
  <div class="row"><label>Border top</label><input type="color" id="ws-border" /></div>
  <div class="row"><label>Hover background</label><input type="color" id="ws-hoverBg" /></div>
  <div class="row"><label>Hover foreground</label><input type="color" id="ws-hoverFg" /></div>
  </div>

  <div class="footer">
    <div id="msg" class="msg"></div>
    <button id="close" title="Option+Esc">Close</button>
    <button id="reset">Reset all</button>
    <button id="save">Save</button>
  </div>

<script>
const { ipcRenderer } = require('electron');
const $ = (id) => document.getElementById(id);
let defaults = null;
const chordInputs = [];

function setVal(id, v) { $(id).value = v == null ? '' : v; }
function val(id) { return $(id).value; }

function renderKeybindings(bindings, defaultBindings) {
  const div = $('keybindings');
  div.innerHTML = '';
  chordInputs.length = 0;
  for (const action of Object.keys(defaultBindings)) {
    const row = document.createElement('div');
    row.className = 'row';
    const label = document.createElement('label');
    label.textContent = action;
    const input = document.createElement('input');
    input.type = 'text';
    input.dataset.action = action;
    input.style.width = '260px';
    const chords = bindings[action] !== undefined ? bindings[action] : defaultBindings[action];
    input.value = Array.isArray(chords) ? chords.join(', ') : String(chords || '');
    input.placeholder = (defaultBindings[action] || []).join(', ');
    row.appendChild(label);
    row.appendChild(input);
    div.appendChild(row);
    chordInputs.push(input);
  }
}

ipcRenderer.on('config-ui-init', (_e, data) => {
  defaults = data.defaults;
  const cur = data.current || {};
  const cT = cur.terminal || {};
  const cTh = cT.theme || {};
  const cW = cur.window || {};
  const cP = (cur.panes && cur.panes.border) || {};
  const cWs = cur.workspaces || {};
  const dT = defaults.terminal;
  const dW = defaults.window;
  const dP = defaults.panes.border;
  const dWs = defaults.workspaces;

  renderKeybindings(cur.keybindings || {}, defaults.keybindings);

  setVal('t-fontFamily', cT.fontFamily || dT.fontFamily);
  setVal('t-fontSize', cT.fontSize != null ? cT.fontSize : dT.fontSize);
  $('t-cursorBlink').checked = cT.cursorBlink !== undefined ? cT.cursorBlink : dT.cursorBlink;
  setVal('t-bg', cTh.background || dT.theme.background);
  setVal('t-fg', cTh.foreground || dT.theme.foreground);
  setVal('t-shell', cT.shell || '');

  setVal('w-width', cW.width || dW.width);
  setVal('w-height', cW.height || dW.height);

  setVal('p-inactive', cP.inactive || dP.inactive);
  setVal('p-focused', cP.focused || dP.focused);
  setVal('p-width', cP.width != null ? cP.width : dP.width);

  $('ws-wrap').checked = cWs.wrap !== undefined ? cWs.wrap : dWs.wrap;
  setVal('ws-bg', cWs.background || dWs.background);
  setVal('ws-fg', cWs.foreground || dWs.foreground);
  setVal('ws-active', cWs.activeForeground || dWs.activeForeground);
  setVal('ws-border', cWs.borderTop || dWs.borderTop);
  setVal('ws-hoverBg', cWs.hoverBackground || dWs.hoverBackground);
  setVal('ws-hoverFg', cWs.hoverForeground || dWs.hoverForeground);
});

$('save').addEventListener('click', () => {
  const keybindings = {};
  for (const input of chordInputs) {
    const chords = input.value.split(',').map(s => s.trim()).filter(Boolean);
    if (chords.length) keybindings[input.dataset.action] = chords;
  }
  const shell = val('t-shell').trim();
  const config = {
    keybindings,
    terminal: {
      fontFamily: val('t-fontFamily'),
      fontSize: parseInt(val('t-fontSize'), 10),
      cursorBlink: $('t-cursorBlink').checked,
      theme: { background: val('t-bg'), foreground: val('t-fg') },
      shell: shell || null,
    },
    window: {
      width: parseInt(val('w-width'), 10),
      height: parseInt(val('w-height'), 10),
    },
    panes: {
      border: {
        inactive: val('p-inactive'),
        focused: val('p-focused'),
        width: parseInt(val('p-width'), 10),
      },
    },
    workspaces: {
      wrap: $('ws-wrap').checked,
      background: val('ws-bg'),
      foreground: val('ws-fg'),
      activeForeground: val('ws-active'),
      borderTop: val('ws-border'),
      hoverBackground: val('ws-hoverBg'),
      hoverForeground: val('ws-hoverFg'),
    },
  };
  ipcRenderer.send('config-ui-save', config);
});

$('close').addEventListener('click', () => {
  ipcRenderer.send('config-ui-close');
});

$('reset').addEventListener('click', () => {
  if (!confirm('Reset everything to defaults? Your current config.json will be cleared.')) return;
  ipcRenderer.send('config-ui-reset');
});

ipcRenderer.on('config-ui-saved', () => {
  const m = $('msg');
  m.textContent = 'Saved';
  m.className = 'msg ok';
  setTimeout(() => { m.textContent = ''; m.className = 'msg'; }, 1500);
});

ipcRenderer.on('config-ui-error', (_e, err) => {
  const m = $('msg');
  m.textContent = err;
  m.className = 'msg err';
});

ipcRenderer.send('config-ui-ready');
</script>
</body>
</html>
