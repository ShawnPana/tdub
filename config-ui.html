<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Terminum Settings</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #1a1a1a; color: #ddd; }
  body { font: 13px -apple-system, BlinkMacSystemFont, sans-serif;
         display: flex; flex-direction: column; }
  .scroll { flex: 1; min-height: 0; overflow-y: auto; padding: 16px 20px; }
  h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: 0.3px; }
  .sub { color: #888; font-size: 11px; margin: 4px 0 16px; }
  h2 { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.6px;
       margin: 18px 0 6px; font-weight: 600; border-bottom: 1px solid #2a2a2a; padding-bottom: 4px; }
  h3 { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.6px;
       margin: 10px 0 4px; font-weight: 600; }
  .row { display: flex; align-items: center; gap: 10px; padding: 3px 0; }
  .row label { flex: 0 0 200px; color: #aaa; font-size: 12px; }
  input[type=text], input[type=number] {
    background: #0d0d0d; color: #ddd; border: 1px solid #333;
    padding: 4px 8px; font: 12px ui-monospace, SFMono-Regular, Menlo, monospace;
    border-radius: 3px; width: 260px; outline: none;
  }
  input[type=text]:focus, input[type=number]:focus { border-color: #4a9eff; }
  input[type=number] { width: 100px; }
  input[type=color] {
    background: transparent; border: 1px solid #333; width: 40px; height: 26px;
    padding: 0; cursor: pointer; border-radius: 3px;
  }
  input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; }
  .nested { margin-left: 14px; border-left: 1px solid #222; padding-left: 12px; }
  .footer { padding: 10px 20px;
            background: #151515; border-top: 1px solid #2a2a2a;
            display: flex; gap: 10px; justify-content: flex-end; align-items: center;
            flex: 0 0 auto; }
  button { background: #2a2a2a; color: #ddd; border: 1px solid #3a3a3a;
           padding: 6px 16px; cursor: pointer; border-radius: 3px; font: inherit; }
  button#save { background: #cd0000; color: #fff; border-color: #8a0000; font-weight: 600; }
  button:hover { background: #3a3a3a; }
  button#save:hover { background: #e50000; }
  .msg { flex: 1; font-size: 11px; padding-left: 4px; }
  .msg.err { color: #cd0000; }
  .msg.ok { color: #4a9eff; }
</style>
</head>
<body>
  <div class="scroll">
    <h1>Terminum Settings</h1>
    <div class="sub">Fields are generated from the current defaults schema.
      Values shown are your overrides from <code>~/.config/terminum/config.json</code>,
      falling back to defaults. Saving only writes fields that differ from defaults.</div>
    <div id="form"></div>
  </div>

  <div class="footer">
    <div id="msg" class="msg"></div>
    <button id="close" title="Option+Esc">Close</button>
    <button id="reset">Reset all</button>
    <button id="save">Save</button>
  </div>

<script>
const { ipcRenderer } = require('electron');
const $ = (id) => document.getElementById(id);

// Section names we intentionally hide. Metadata keys in defaults.json.
const SKIP_TOP_KEYS = new Set(['_comment', '_reference']);
// Only top-level sections in this ordering — anything we don't know about
// still renders, just alphabetized at the end.
const SECTION_ORDER = ['keybindings', 'terminal', 'window', 'panes', 'workspaces', 'browser'];

let defaults = null;
let current = null;

function formatLabel(key) {
  // camelCase → "Sentence case"
  return key.replace(/([A-Z])/g, ' $1').toLowerCase().replace(/^./, c => c.toUpperCase());
}

function isHexColor(s) {
  return typeof s === 'string' && /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(s);
}

function getPath(obj, path) {
  let v = obj;
  for (const seg of path) {
    if (v == null) return undefined;
    v = v[seg];
  }
  return v;
}

function setPath(obj, path, value) {
  let o = obj;
  for (let i = 0; i < path.length - 1; i++) {
    const seg = path[i];
    if (typeof o[seg] !== 'object' || o[seg] === null || Array.isArray(o[seg])) o[seg] = {};
    o = o[seg];
  }
  o[path[path.length - 1]] = value;
}

function renderLeaf(path, dv, cv, container) {
  const row = document.createElement('div');
  row.className = 'row';
  const label = document.createElement('label');
  label.textContent = formatLabel(path[path.length - 1]);
  row.appendChild(label);

  let input;
  const attrPath = path.join('.');

  if (typeof dv === 'boolean') {
    input = document.createElement('input');
    input.type = 'checkbox';
    input.checked = typeof cv === 'boolean' ? cv : dv;
    input.dataset.kind = 'bool';
  } else if (typeof dv === 'number') {
    input = document.createElement('input');
    input.type = 'number';
    input.value = typeof cv === 'number' ? cv : dv;
    input.dataset.kind = 'number';
  } else if (Array.isArray(dv)) {
    input = document.createElement('input');
    input.type = 'text';
    input.style.width = '260px';
    const list = Array.isArray(cv) ? cv : dv;
    input.value = list.join(', ');
    input.dataset.kind = 'array';
  } else if (isHexColor(dv)) {
    input = document.createElement('input');
    input.type = 'color';
    const v = isHexColor(cv) ? cv : dv;
    // color input needs 6-digit hex
    input.value = v.length === 4
      ? '#' + v.slice(1).split('').map(c => c + c).join('')
      : v;
    input.dataset.kind = 'color';
  } else if (dv === null) {
    // null default → optional string (e.g. terminal.shell).
    input = document.createElement('input');
    input.type = 'text';
    input.placeholder = '(default: unset)';
    input.value = typeof cv === 'string' ? cv : '';
    input.dataset.kind = 'nullable-string';
  } else {
    input = document.createElement('input');
    input.type = 'text';
    input.value = typeof cv === 'string' ? cv : (dv == null ? '' : String(dv));
    input.dataset.kind = 'string';
  }
  input.dataset.path = attrPath;
  row.appendChild(input);
  container.appendChild(row);
}

function renderFields(pathPrefix, defSection, curSection, container) {
  for (const [k, dv] of Object.entries(defSection)) {
    const path = [...pathPrefix, k];
    const cv = curSection != null ? curSection[k] : undefined;
    if (dv && typeof dv === 'object' && !Array.isArray(dv)) {
      const h3 = document.createElement('h3');
      h3.textContent = formatLabel(k);
      container.appendChild(h3);
      const nest = document.createElement('div');
      nest.className = 'nested';
      container.appendChild(nest);
      renderFields(path, dv, cv && typeof cv === 'object' ? cv : {}, nest);
    } else {
      renderLeaf(path, dv, cv, container);
    }
  }
}

function renderForm() {
  const form = $('form');
  form.innerHTML = '';

  const topKeys = Object.keys(defaults).filter(k => !SKIP_TOP_KEYS.has(k));
  topKeys.sort((a, b) => {
    const ai = SECTION_ORDER.indexOf(a);
    const bi = SECTION_ORDER.indexOf(b);
    if (ai === -1 && bi === -1) return a.localeCompare(b);
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });

  for (const section of topKeys) {
    const dv = defaults[section];
    if (dv === null || dv === undefined) continue;
    const h2 = document.createElement('h2');
    h2.textContent = formatLabel(section);
    form.appendChild(h2);
    if (dv && typeof dv === 'object' && !Array.isArray(dv)) {
      renderFields([section], dv, (current && current[section]) || {}, form);
    } else {
      renderLeaf([section], dv, current ? current[section] : undefined, form);
    }
  }
}

function readInput(input) {
  switch (input.dataset.kind) {
    case 'bool':            return input.checked;
    case 'number': {
      const n = Number(input.value);
      return Number.isFinite(n) ? n : undefined;
    }
    case 'array':           return input.value.split(',').map(s => s.trim()).filter(Boolean);
    case 'color':           return input.value;
    case 'nullable-string': return input.value.trim() ? input.value : null;
    case 'string':
    default:                return input.value;
  }
}

function collectForm() {
  const out = {};
  for (const input of document.querySelectorAll('#form [data-path]')) {
    const path = input.dataset.path.split('.');
    const v = readInput(input);
    if (v === undefined) continue;
    setPath(out, path, v);
  }
  return out;
}

ipcRenderer.on('config-ui-init', (_e, data) => {
  defaults = data.defaults || {};
  current = data.current || {};
  renderForm();
});

$('save').addEventListener('click', () => {
  ipcRenderer.send('config-ui-save', collectForm());
});

$('close').addEventListener('click', () => {
  ipcRenderer.send('config-ui-close');
});

$('reset').addEventListener('click', () => {
  if (!confirm('Reset everything to defaults? Your current config.json will be cleared.')) return;
  ipcRenderer.send('config-ui-reset');
});

ipcRenderer.on('config-ui-saved', () => {
  const m = $('msg');
  m.textContent = 'Saved';
  m.className = 'msg ok';
  setTimeout(() => { m.textContent = ''; m.className = 'msg'; }, 1500);
});

ipcRenderer.on('config-ui-error', (_e, err) => {
  const m = $('msg');
  m.textContent = err;
  m.className = 'msg err';
});

ipcRenderer.send('config-ui-ready');
</script>
</body>
</html>
