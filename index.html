<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>tdub</title>
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css">
  <style>
    :root {
      --pane-border-inactive: #2a2a2a;
      --pane-border-focused: #4a9eff;
      --pane-border-width: 1px;
      --bar-height: 22px;
    }
    html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
    body { -webkit-user-select: none; user-select: none; display: flex; flex-direction: column; }
    #stage { position: relative; flex: 1; min-height: 0; }
    #statusbar {
      height: var(--bar-height);
      min-height: var(--bar-height);
      display: flex;
      align-items: center;
      padding: 0 6px;
      background: #0b0b0b;
      color: #999;
      font: 11px ui-monospace, Menlo, monospace;
      overflow: hidden;
      gap: 4px;
      border-top: 1px solid #1a1a1a;
    }
    .ws-tab {
      padding: 2px 8px;
      border-radius: 3px;
      cursor: pointer;
      white-space: nowrap;
      color: #999;
    }
    .ws-tab:hover { background: #1a1a1a; color: #ddd; }
    .ws-tab.active { color: #cd0000; font-weight: bold; }
    .pane-host {
      position: absolute;
      overflow: hidden;
      box-sizing: border-box;
      background: #000;
      border: var(--pane-border-width) solid var(--pane-border-inactive);
      transition: border-color 80ms linear;
    }
    .pane-host.focused { border-color: var(--pane-border-focused); }
    .pane-host.browser { background: transparent; }
    .pane-host .xterm { height: 100%; padding: 2px; box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="stage"></div>
  <div id="statusbar"></div>
  <script src="renderer.js"></script>
</body>
</html>
