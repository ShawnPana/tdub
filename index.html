<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Terminum</title>
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css">
  <style>
    :root {
      --pane-border-inactive: #2a2a2a;
      --pane-border-focused: #4a9eff;
      --pane-border-width: 1px;
      --bar-height: 22px;
      --bar-font-size: 11px;
      --ws-bg: #0b0b0b;
      --ws-fg: #999999;
      --ws-active-fg: #cd0000;
      --ws-border-top: #1a1a1a;
      --ws-hover-bg: #1a1a1a;
      --ws-hover-fg: #dddddd;
    }
    html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
    body { -webkit-user-select: none; user-select: none; display: flex; flex-direction: column; }
    #stage { position: relative; flex: 1; min-height: 0; }
    #statusbar {
      height: var(--bar-height);
      min-height: var(--bar-height);
      display: flex;
      align-items: center;
      padding: 0 6px;
      background: var(--ws-bg);
      color: var(--ws-fg);
      font-size: var(--bar-font-size);
      font-family: ui-monospace, Menlo, monospace;
      overflow: hidden;
      gap: 4px;
      border-top: 1px solid var(--ws-border-top);
    }
    .ws-tab {
      padding: 2px 8px;
      border-radius: 3px;
      cursor: pointer;
      white-space: nowrap;
      color: var(--ws-fg);
    }
    .ws-tab:hover { background: var(--ws-hover-bg); color: var(--ws-hover-fg); }
    .ws-tab.active { color: var(--ws-active-fg); font-weight: bold; }
    .pane-host {
      position: absolute;
      overflow: hidden;
      box-sizing: border-box;
      background: #000;
      border: var(--pane-border-width) solid var(--pane-border-inactive);
      transition: border-color 80ms linear;
    }
    .pane-host.focused { border-color: var(--pane-border-focused); }
    .pane-host.browser { background: transparent; }
    .pane-host .xterm { height: 100%; padding: 2px; box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="stage"></div>
  <div id="statusbar"></div>
  <script src="renderer.js"></script>
</body>
</html>
